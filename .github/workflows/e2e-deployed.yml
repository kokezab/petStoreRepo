name: E2E against deployed app

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - name: Build project
        run: vercel build --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN" 2>/dev/null)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  e2e:
    needs: deploy-preview
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: ${{ needs.deploy-preview.outputs.url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests against preview deployment
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  promote-production:
    needs: [deploy-preview, e2e]
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Promote tested preview to production
        run: vercel promote "${{ needs.deploy-preview.outputs.url }}" --token="$VERCEL_TOKEN" --yes
